<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Form-HTML5</title>

    <!-- Hojas de Estilos Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Font Aweasome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Mi hoja de estilos -->
    <link rel="stylesheet" href="styles.css">

</head>

<body>
    <form action="" method="post" class="d-flex flex-column gap-4">

        <!-- Contenedor principal -->
        <div class="container my-5">

            <!-- Encabezado -->
            <div class="container border rounded-top">
                <div class="row p-2 bg-primary text-dark">
                    <h1> Your Payment Here</h1>
                </div>
            </div>

            <!-- Body del formulario -->
            <div class="container d-flex flex-column gap-4 border py-3 px-5">
                <!-- Campo error -->
                <div class="row p-3 bg-danger rounded-2">
                    <h5 class="text-danger-emphasis">Some fields are missing</h5>
                </div>
                <!-- Campos a rellenar por el cliente -->
                <!-- Primera fila de inputs -->
                <div class="row">
                    <!-- Tarjeta -->
                    <div class="col-5 d-flex flex-column gap-2">
                        <label for="card">My Card*</label>
                        <input type="text" id="card" name="card" placeholder="XXXXXXXXXXXXXXXXXX" required>
                    </div>
                    <!-- CVC -->
                    <div class="col-3 d-flex flex-column gap-2">
                        <label for="cvc">CVC*</label>
                        <input type="text" id="cvc" name="cvc" placeholder="000" size="3" required>
                    </div>
                    <!-- Cantidad -->
                    <div class="col-4 d-flex flex-column gap-2">
                        <label for="amount">Amount*</label>
                        <input type="text" id="amount" name="Amount" placeholder="$ Amount" required>
                    </div>
                </div>
                <!-- Segunda fila de inputs -->
                <div class="row">
                    <!-- Nombre -->
                    <div class="col d-flex flex-column gap-2">
                        <label for="firstName">First Name*</label>
                        <input type="text" id="firstName" name="firstName" placeholder="name" required>
                    </div>
                    <!-- Apellido -->
                    <div class="col d-flex flex-column gap-2">
                        <label for="lastName">Last Name*</label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>
                </div>
                <!-- Tercera fila de inputs -->
                <div class="row">
                    <!-- Ciudad -->
                    <div class="col-6 d-flex flex-column gap-2">
                        <label for="city">City*</label>
                        <input type="text" id="city" name="city" required>
                    </div>
                    <!-- Estado -->
                    <div class="col-3 d-flex flex-column gap-2">
                        <label for="state">Country*</label>
                        <select class="p-2" name="country" id="country" required>
                            <option value="">Pick a Country</option>
                            <option value="Panamá">Panama</option>
                            <option value="Venezuela">Venezuela</option>
                            <option value="Colombia">Colombia</option>
                            <option value="Estados Unidos">Estados Unidos</option>
                            <option value="Chile">Chile</option>
                            <option value="Argentina">Argentina</option>
                            <option value="España">España</option>
                            <option value="Peru">Peru</option>
                        </select>
                    </div>
                    <!-- Código Postal -->
                    <div class="col-3 d-flex flex-column gap-2">
                        <label for="postalCode">Postal Code*</label>
                        <input type="text" id="postalCode" name="postalCode" required>
                    </div>
                </div>
                <!-- Cuarta fila de inputs -->
                <div class="row">
                    <!-- Método de pago -->
                    <div class="col d-flex flex-column gap-3">
                        <label for="">We accept:</label>
                        <div class="container">
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="paymentMethod" id="mastercard"
                                    value="option1">
                                <label class="form-check-label" for="mastercard"><i
                                        class="fa-brands fa-cc-mastercard"></i></label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="paymentMethod" id="visa"
                                    value="option2">
                                <label class="form-check-label" for="visa"><i class="fa-brands fa-cc-visa"></i></label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="paymentMethod" id="applePay"
                                    value="option3">
                                <label class="form-check-label" for="applePay"><i
                                        class="fa-brands fa-apple-pay"></i></label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="paymentMethod" id="paypal"
                                    value="option3">
                                <label class="form-check-label" for="paypal"><i
                                        class="fa-brands fa-cc-paypal"></i></label>
                            </div>
                        </div>
                    </div>

                    <!-- Mensaje -->
                    <div class="col d-flex flex-column gap-2">
                        <label for="mensaje">Message</label>
                        <textarea name="mensaje" id="mensaje"></textarea>
                        <small class="text-body-tertiary">Add any notes here.</small>
                    </div>
                </div>

            </div>

            <!-- Footer -->
            <div class="container p-3 border bg-light rounded-bottom">
                <div class="row">
                    <div class="col d-flex justify-content-end gap-1 me-2">
                        <input type="reset" class="btn btn-secondary" value="Cancel">
                        <input type="submit" class="btn btn-primary" value="Send">
                    </div>
                </div>

            </div>
    </form>

</body>

</html>
